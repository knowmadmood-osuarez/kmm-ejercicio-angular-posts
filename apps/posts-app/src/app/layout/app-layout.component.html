<div class="flex min-h-screen flex-col bg-surface">
  <!-- Skip to content (a11y) -->
  <a
    href="#main-content"
    class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50 focus:rounded-lg focus:bg-primary focus:px-4 focus:py-2 focus:text-sm focus:font-bold focus:text-white focus:shadow-primary"
  >
    {{ 'shared.skipToContent' | transloco }}
  </a>

  <!-- ═══ Header ═══ -->
  <header
    class="sticky top-0 z-40 w-full border-b border-input-border bg-header-bg backdrop-blur-[6px]"
    role="banner"
  >
    <div class="mx-auto flex h-16 max-w-7xl items-center gap-4 px-4 sm:px-6">
      <!-- Logo -->
      <a
        routerLink="/posts"
        class="shrink-0 text-lg font-bold tracking-[-0.9px] text-text"
        aria-label="PostsApp home"
      >
        Posts<span class="text-primary">App</span>
      </a>

      <!-- Search — desktop only -->
      <div class="relative mx-auto hidden flex-1 max-w-xl sm:block">
        <div class="pointer-events-none absolute inset-y-0 left-3 flex items-center">
          <app-icon name="search" class="h-3.5 w-3.5 text-text-secondary" />
        </div>
        <input
          #desktopSearch
          type="search"
          class="h-10 w-full rounded-lg border border-input-border bg-surface-alt pl-9 pr-3 text-sm text-text placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary/30"
          [placeholder]="'posts.list.search' | transloco"
          [value]="searchValue()"
          (keydown.enter)="onSearch(desktopSearch.value)"
          [attr.aria-label]="'shared.search' | transloco"
        />
      </div>

      <!-- Desktop actions -->
      <div class="hidden shrink-0 items-center gap-3 sm:flex">
        <app-language-switcher />
        <button
          type="button"
          class="inline-flex items-center justify-center rounded-lg p-2 text-text-secondary transition-colors hover:bg-surface-alt hover:text-text focus:outline-none focus:ring-2 focus:ring-primary/30"
          (click)="onLogout()"
          [attr.aria-label]="'header.logout' | transloco"
        >
          <app-icon name="logout" class="h-5 w-5" />
        </button>
      </div>

      <!-- Mobile hamburger -->
      <button
        type="button"
        class="ml-auto inline-flex items-center justify-center rounded-lg p-2 text-text-secondary transition-colors hover:bg-surface-alt hover:text-text focus:outline-none focus:ring-2 focus:ring-primary/30 sm:hidden"
        (click)="toggleMenu()"
        [attr.aria-label]="'shared.toggleMenu' | transloco"
        [attr.aria-expanded]="menuOpen()"
      >
        @if (menuOpen()) {
          <app-icon name="close" class="h-5 w-5" />
        } @else {
          <app-icon name="menu" class="h-5 w-5" />
        }
      </button>
    </div>

    <!-- Mobile dropdown -->
    @if (menuOpen()) {
      <div class="animate-slide-down border-t border-input-border px-4 pb-4 pt-3 sm:hidden">
        <!-- Search -->
        <div class="relative">
          <div class="pointer-events-none absolute inset-y-0 left-3 flex items-center">
            <app-icon name="search" class="h-3.5 w-3.5 text-text-secondary" />
          </div>
          <input
            #mobileSearch
            type="search"
            class="h-10 w-full rounded-lg border border-input-border bg-surface-alt pl-9 pr-3 text-sm text-text placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary/30"
            [placeholder]="'posts.list.search' | transloco"
            [value]="searchValue()"
            (keydown.enter)="onSearch(mobileSearch.value)"
            [attr.aria-label]="'shared.search' | transloco"
          />
        </div>
        <!-- Language + Logout -->
        <div class="mt-3 flex items-center justify-between">
          <app-language-switcher />
          <button
            type="button"
            class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-text-secondary transition-colors hover:bg-surface-alt hover:text-text"
            (click)="onLogout()"
          >
            <app-icon name="logout" class="h-4 w-4" />
            {{ 'header.logout' | transloco }}
          </button>
        </div>
      </div>
    }
  </header>

  <!-- ═══ Main content ═══ -->
  <main
    id="main-content"
    class="mx-auto w-full max-w-7xl flex-1 px-4 pb-20 pt-8 sm:px-6"
    role="main"
  >
    <router-outlet />
  </main>
</div>
