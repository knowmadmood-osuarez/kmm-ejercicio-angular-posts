<!-- Header -->
<header
  class="fixed left-0 right-0 top-0 z-10 flex items-center justify-between bg-header-bg px-6 py-4 backdrop-blur-[6px]"
>
  <span class="text-lg font-bold tracking-[-0.9px] text-text">PostsApp</span>
  <app-language-switcher />
</header>

<!-- Main: centered login card -->
<main class="flex min-h-screen items-center justify-center bg-surface px-6">
  <div class="w-full max-w-100">
    <!-- Heading -->
    <div class="mb-10 flex flex-col gap-2">
      <h1 class="text-[30px] font-extrabold leading-9.5 tracking-tight text-text">
        {{ 'auth.login.title' | transloco }}
      </h1>
      <p class="text-base text-text-secondary">
        {{ 'auth.login.subtitle' | transloco }}
      </p>
    </div>

    <!-- Login form card -->
    <app-login-form [loading]="loading()" [error]="error()" (submitted)="onLogin($event)" />
  </div>
</main>
