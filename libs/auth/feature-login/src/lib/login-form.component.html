<div
  class="rounded-lg border border-input-border bg-card shadow-card"
  style="padding: 32px 32px 48px"
>
  <app-linear-progress [visible]="loading()" />

  <form (submit)="onSubmit($event)" class="flex flex-col gap-6">
    <div class="flex flex-col gap-2">
      <app-label for="login-name" variant="compact">
        {{ 'auth.login.username' | transloco }}
      </app-label>
      <app-input
        id="login-name"
        name="name"
        variant="login"
        [icon]="true"
        [placeholder]="'auth.login.username' | transloco"
        [value]="loginForm.name().value()"
        [disabled]="loading()"
        [ariaLabel]="'auth.login.username' | transloco"
        (valueChange)="loginForm.name().value.set($event)"
      >
        <app-icon slot="icon" name="user" class="h-3.5 w-3.5 text-text-secondary" />
      </app-input>
    </div>

    <div class="flex flex-col gap-2">
      <app-label for="login-password" variant="compact">
        {{ 'auth.login.password' | transloco }}
      </app-label>
      <app-input
        id="login-password"
        name="password"
        type="password"
        variant="login"
        [icon]="true"
        [placeholder]="'auth.login.password' | transloco"
        [value]="loginForm.password().value()"
        [disabled]="loading()"
        [ariaLabel]="'auth.login.password' | transloco"
        (valueChange)="loginForm.password().value.set($event)"
      >
        <app-icon slot="icon" name="lock" class="h-3.5 w-3.5 text-text-secondary" />
      </app-input>
    </div>

    @if (error()) {
      <p class="text-sm text-danger" role="alert" aria-live="polite">
        {{ 'auth.login.error' | transloco }}
      </p>
    }

    <div class="pt-2">
      <app-button
        type="submit"
        variant="primary"
        size="xl"
        class="w-full"
        [fullWidth]="true"
        [disabled]="loginForm().invalid()"
      >
        {{ 'auth.login.submit' | transloco }}
        <app-icon name="arrow-right" class="h-3 w-3" />
      </app-button>
    </div>
  </form>
</div>
