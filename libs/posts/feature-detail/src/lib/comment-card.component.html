<div class="py-5">
  <!-- Author + date inline -->
  <div class="flex items-baseline gap-2">
    <span class="text-sm font-bold text-text">{{ authorName() }}</span>
    <span class="text-xs text-text-muted">{{ relativeDate() }}</span>
  </div>

  <!-- Body -->
  <p class="mt-1 text-sm leading-relaxed text-text-secondary">{{ comment().body }}</p>

  <!-- Owner actions -->
  @if (isOwner()) {
    <div class="mt-3 flex items-center gap-2">
      <app-button
        type="button"
        variant="ghost"
        size="sm"
        (click)="editClicked.emit(comment())"
        [attr.aria-label]="'comments.edit' | transloco"
      >
        {{ 'shared.edit' | transloco }}
      </app-button>

      <app-button
        type="button"
        variant="danger"
        size="sm"
        (click)="deleteClicked.emit(comment().id)"
        [attr.aria-label]="'comments.delete' | transloco"
      >
        {{ 'shared.delete' | transloco }}
      </app-button>
    </div>
  }
</div>
